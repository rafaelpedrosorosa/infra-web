server {
    listen 80;
    listen [::]:80;

    server_name wordpress.test;

    root /var/www/wordpress.test/public_html;
    index index.php index.html;

    access_log /var/log/nginx/wordpress.test_access.log;
    error_log  /var/log/nginx/wordpress.test_error.log;

    # WordPress usa URLs amigáveis. Caso o arquivo ou diretório
    # solicitado não exista, a requisição é enviada ao index.php.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Encaminha arquivos PHP ao worker PHP-FPM.
    # O backend PHP pode ser atendido por PHP-FPM ou LSPHP,
    # conforme a arquitetura adotada no ambiente.
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
    }

    # Bloqueia arquivos ocultos, preservando /.well-known/
    # para validações como ACME/Let's Encrypt.
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Mantém arquivos estáticos no cache do navegador por sete dias,
    # reduzindo requisições repetidas e o volume de dados transferidos.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;

        try_files $uri =404;
    }

    # Comprime respostas textuais maiores que 1 KB,
    # reduzindo o tamanho das respostas enviadas ao cliente.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
